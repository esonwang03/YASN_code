name: Test Build

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-2022
          - rid: osx-x64
            os: macos-14
          - rid: osx-arm64
            os: macos-14

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore YASN.sln

      - name: Publish
        run: dotnet publish src/YASN.App/YASN.App.csproj -c Release -r ${{ matrix.rid }} --self-contained false --no-restore -o publish/${{ matrix.rid }}

      - name: Publish migrate CLI (Windows)
        if: matrix.rid == 'win-x64'
        run: dotnet publish tools/YASN.Migrator/YASN.Migrator.csproj -c Release -r win-x64 --self-contained false --no-restore -o publish/win-x64/tools

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "YASN-${{ matrix.rid }}.zip"

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x "publish/${{ matrix.rid }}/YASN"
          (cd "publish/${{ matrix.rid }}" && zip -r -y "$GITHUB_WORKSPACE/YASN-${{ matrix.rid }}.zip" .)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: YASN-${{ matrix.rid }}
          path: YASN-${{ matrix.rid }}.zip
          if-no-files-found: error

name: Build

# Single build pipeline for distributable artifacts.
#   - push of a v* tag -> build, upload artifacts, AND publish a GitHub Release.
#   - manual dispatch   -> build and upload the same artifacts to the run (no Release).
# PR validation lives in ci.yml (restore + Release build + test on both OSes).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-2022
          - rid: osx-x64
            os: macos-14
          - rid: osx-arm64
            os: macos-14

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The native notification cdylib (native/yasn-notify) is built per RID by an MSBuild target
      # during publish, so the Rust toolchain and the matching target triple must be present first.
      # Unlike .NET AOT, Rust cross-compiles between the two Apple archs, so the osx-x64 image's
      # cdylib can be built on the macos-14 (arm) runner once x86_64-apple-darwin is installed.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rid == 'osx-x64' && 'x86_64-apple-darwin' || matrix.rid == 'osx-arm64' && 'aarch64-apple-darwin' || 'x86_64-pc-windows-msvc' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/yasn-notify

      # On a tag the version is the tag without the leading 'v'; a manual dispatch has no
      # release version, so use 0.0.0 (a valid CFBundleShortVersionString) for the bundle.
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore YASN.sln

      - name: Publish
        # EnableAot=true compiles a native image per RID (no JIT, no single-file). NativeAOT cannot
        # cross-compile, so each RID builds on its own-OS runner (the matrix already does this); the
        # runner images supply the native toolchain the link step needs (VS C++ on Windows, clang on
        # macOS). Third-party native dylibs (Skia, HarfBuzz, e_sqlite3) are still emitted loose beside
        # the native executable, so the macOS bundler's dylib relocation and NativeLibraryResolver
        # path are unchanged.
        #
        # NO --no-restore: the RID-specific runtime.<rid>.microsoft.dotnet.ilcompiler package is only
        # pulled when restore runs with this RID + EnableAot. The earlier `dotnet restore YASN.sln`
        # (no RID, no flag) doesn't pull it, so a --no-restore AOT publish silently skips ILC,
        # suppresses the apphost, and emits only YASN.dll — leaving no 'YASN' executable for the
        # bundler. Letting publish restore itself is required for AOT to actually run.
        run: dotnet publish src/YASN.App/YASN.App.csproj -c Release -p:EnableAot=true -r ${{ matrix.rid }} --self-contained true -o publish/${{ matrix.rid }}

      - name: Publish migrate CLI (Windows)
        if: matrix.rid == 'win-x64'
        run: dotnet publish tools/YASN.Migrator/YASN.Migrator.csproj -c Release -r win-x64 --self-contained true --no-restore -o publish/win-x64/tools

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "YASN-${{ matrix.rid }}.zip"

      - name: Bundle and sign .app (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/bundle-macos.sh
          scripts/bundle-macos.sh \
            "publish/${{ matrix.rid }}" \
            build/macos/AppIcon.png \
            build/macos/Info.plist.template \
            "${{ steps.ver.outputs.version }}" \
            "dist/YASN.app"

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        # ditto preserves the code signature and bundle metadata that plain `zip` strips.
        run: ditto -c -k --keepParent "dist/YASN.app" "YASN-${{ matrix.rid }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: YASN-${{ matrix.rid }}
          path: YASN-${{ matrix.rid }}.zip
          if-no-files-found: error

      - name: Upload to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: YASN-${{ matrix.rid }}.zip
